name: 🚀 Simple CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Stage 1: Unit Tests (< 1 minute)
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: 📦 Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: 🧪 Run backend unit tests
        run: |
          cd backend
          python -m pytest tests/test_business_logic.py tests/test_simple.py -v --tb=short
        env:
          TESTING: "1"

      - name: 🟨 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📦 Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: 🧪 Run frontend unit tests
        run: |
          cd frontend
          npm test -- --passWithNoTests --watchAll=false
        env:
          CI: true

  # Stage 2: Integration Tests (< 1 minute)
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: 📦 Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: 🔗 Run API contract tests
        run: |
          cd backend
          python -m pytest tests/test_api_contracts.py tests/test_jobs.py -v --tb=short
        env:
          TESTING: "1"

  # Stage 3: E2E Tests (< 1 minute, main branch only)
  e2e-tests:
    name: 🎯 E2E Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟨 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📦 Install dependencies
        run: |
          cd frontend
          npm ci

      - name: 🏗️ Build frontend
        run: |
          cd frontend
          npm run build

      - name: 🎯 Run critical E2E tests
        run: |
          cd frontend
          npm run test:e2e:ci
        env:
          CYPRESS_BASE_URL: http://localhost:3000
          CI: true

  # Success Summary
  ci-success:
    name: ✅ CI Pipeline Complete
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()
    steps:
      - name: ✅ All tests passed
        if: needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success'
        run: |
          echo "🎉 All tests passed! Ready to merge."
          echo "📊 Pipeline completed in < 3 minutes"
          
      - name: ❌ Tests failed
        if: needs.unit-tests.result == 'failure' || needs.integration-tests.result == 'failure'
        run: |
          echo "❌ Some tests failed. Check the logs above."
          exit 1 