name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Install pytest dependencies
        run: pip install pytest pytest-asyncio pytest-xdist httpx requests fakeredis
      
      - name: Verify dependencies
        run: |
          python -c "import pytest; print(f'pytest version: {pytest.__version__}')"
          python -c "import httpx; print(f'httpx version: {httpx.__version__}')"
          python -c "import requests; print(f'requests version: {requests.__version__}')"
          python -c "import fakeredis; print(f'fakeredis version: {fakeredis.__version__}')"
      
      - name: Run backend tests with mock storage
        run: |
          echo "🧪 Running backend tests excluding E2E tests..."
          python -m pytest tests/ --ignore=tests/e2e --ignore=tests/test_e2e_smoke.py -v --maxfail=1 --disable-warnings --tb=short
        env:
          TESTING: "1"
          
      - name: Run simplified mock storage tests
        run: |
          echo "🔍 Running simplified mock storage validation..."
          python -m pytest tests/test_jobs_mock_storage_simplified.py -v --disable-warnings
        env:
          TESTING: "1"
          
      - name: Validate mock storage integration
        run: |
          echo "✅ Validating InMemoryStorage functionality..."
          python -c "
          from app.utils.mock_storage import InMemoryStorage
          storage = InMemoryStorage()
          storage._store['test.mp4'] = b'test content'
          assert storage.get_file_content('test.mp4') == b'test content'
          assert 'memory://test.mp4' == storage.generate_presigned_url('test.mp4')
          storage.delete('test.mp4')
          assert len(storage.list_keys()) == 0
          print('✅ Mock storage validation passed!')
          "
        env:
          TESTING: "1"

  frontend-test:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          chmod +x ../scripts/install-npm-deps.sh
          ../scripts/install-npm-deps.sh 180 .
        timeout-minutes: 5
      
      - name: Install Cypress binary
        run: |
          echo "Installing Cypress binary..."
          npx cypress install
          echo "Verifying Cypress installation..."
          npx cypress verify
      
      - name: Format code with Prettier
        run: |
          echo "Running Prettier to fix code formatting..."
          npx prettier --write . --ignore-path .gitignore
          echo "Code formatting complete"
      
      - name: Run unit tests
        run: npm test
      
      - name: Build for E2E
        run: npm run build
      
      - name: Install serve
        run: npm install -g serve
      
      - name: Serve static build
        run: npx serve out -l 5000 &
        
      - name: Wait for server to be ready
        run: |
          echo "Waiting for server to start..."
          timeout 30 bash -c 'until curl -f http://localhost:5000 > /dev/null 2>&1; do sleep 1; done'
          echo "Server is ready!"
      
      - name: Run Cypress E2E tests
        continue-on-error: true
        env:
          CYPRESS_BASE_URL: http://localhost:5000
          # Point to a mock API endpoint for E2E tests since backend won't be running
          NEXT_PUBLIC_API_URL: http://localhost:5000
        run: npx cypress run --spec 'cypress/e2e/visual_regression.cy.ts' --headless
        
      - name: Upload Cypress artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-artifacts
          path: |
            frontend/cypress/videos/
            frontend/cypress/screenshots/
          retention-days: 7

  final-review:
    needs: [test, frontend-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'
      
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Install frontend dependencies
        run: |
          chmod +x scripts/install-npm-deps.sh
          ./scripts/install-npm-deps.sh 180 frontend
        timeout-minutes: 5
      
      - name: Install global audit tools
        run: |
          npm install -g @lhci/cli @axe-core/cli
          # Verify installations
          lhci --version
          axe --version
      
      - name: Start services for audit
        run: |
          # Start Redis first and wait for it to be ready
          docker compose up -d redis
          
          echo "Waiting for Redis to be ready..."
          for i in {1..10}; do
            if docker compose exec -T redis redis-cli ping | grep -q "PONG"; then
              echo "✅ Redis is ready"
              break
            fi
            echo "   Waiting for Redis... ($i/10)"
            sleep 2
          done
          
          # Start backend with Redis retry logic (use absolute path)
          cd backend
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          BACKEND_PID=$!
          echo "Backend PID: $BACKEND_PID"
          cd ..
          
          # Wait for backend to be ready
          sleep 10
          for i in {1..30}; do
            if curl -s http://localhost:8000/health > /dev/null; then
              echo "✅ Backend is ready"
              break
            fi
            echo "   Waiting for backend... ($i/30)"
            sleep 2
          done
          
          # Build and start frontend server for audits and smoke tests
          cd frontend
          
          echo "🏗️ Building frontend..."
          npm run build
          
          echo "🌐 Starting frontend server on port 3000..."
          npx serve out -l 3000 --no-clipboard &
          FRONTEND_PID=$!
          echo "Frontend PID: $FRONTEND_PID"
          cd ..
          
          # Save PIDs for cleanup later
          echo $BACKEND_PID > /tmp/backend.pid
          echo $FRONTEND_PID > /tmp/frontend.pid
          
          # Wait for frontend server to be ready
          echo "⏳ Waiting for frontend server to be ready..."
          for i in {1..30}; do
            if curl -f -s http://localhost:3000 > /dev/null; then
              echo "✅ Frontend server is ready"
              break
            fi
            echo "   Waiting for frontend server... ($i/30)"
            sleep 2
          done
      
      - name: Run Final Review Audit
        run: |
          # The final-review script expects servers to already be running
          # We've started them in the previous step, so just run the audit parts
          echo "🚀 Running audit checks with pre-started servers..."
          
          # Ensure reports directory exists
          mkdir -p reports/lighthouse
          
          # Run a simplified audit that doesn't start/stop servers
          cd frontend
          
          # 1. Lighthouse Performance Audit
          echo "🚀 Running Lighthouse Performance Audit..."
          echo "Using external servers: frontend=http://localhost:3000, backend=http://localhost:8000"
          
          # Use lhci collect since we already have servers running
          npx lhci collect \
            --url="http://localhost:3000" \
            --numberOfRuns=1 \
            --settings.chromeFlags="--no-sandbox --headless --disable-gpu --disable-dev-shm-usage" \
            --settings.preset="desktop" \
            || echo "❌ Lighthouse collect failed"
          
          # Upload the results to filesystem
          npx lhci upload \
            --target=filesystem \
            --outputDir=../reports/lighthouse \
            || echo "❌ Lighthouse upload failed"
          
          # 2. Bundle Size Audit
          echo "📦 Running Bundle Size Audit..."
          npm run audit:bundle > ../reports/bundle-audit.log 2>&1 || echo "❌ Bundle audit failed"
          
          # 3. Security Headers Check
          echo "🔒 Checking Security Headers..."
          curl -I http://localhost:3000 > ../reports/security-headers.log 2>&1 || echo "❌ Security headers check failed"
          
          # Go back to root directory
          cd ..
          
          # 4. Performance API Check
          echo "⚡ Testing API Performance..."
          mkdir -p reports
          curl -o reports/api-health.json -w '{"time_total":%{time_total}}' http://localhost:8000/health > reports/api-performance.log 2>&1 || echo "❌ API performance check failed"
          
          echo "✅ Audit checks completed"
          
          # Debug: List what was created in reports directory
          echo "📁 Reports directory contents:"
          ls -la reports/ || echo "No reports directory found"
          if [ -d "reports/lighthouse" ]; then
            echo "📊 Lighthouse reports:"
            ls -la reports/lighthouse/ || echo "Lighthouse directory is empty"
          fi
      
      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-review-reports
          path: reports/
          retention-days: 30
      
      - name: Lighthouse gate
        run: |
          # Check if audit passed based on reports directory
          echo "🔍 Checking Lighthouse audit results..."
          
          # Debug: Show current working directory and reports structure
          pwd
          echo "📁 Full reports directory structure:"
          find reports/ -type f 2>/dev/null || echo "No reports directory found"
          
          if [ -d "reports/lighthouse" ]; then
            echo "✅ Lighthouse reports directory exists"
            
            # Check if there are any files in the lighthouse directory
            LIGHTHOUSE_FILES=$(find reports/lighthouse -type f 2>/dev/null | wc -l)
            echo "📊 Found $LIGHTHOUSE_FILES files in lighthouse reports"
            
            if [ "$LIGHTHOUSE_FILES" -gt 0 ]; then
              echo "✅ Final review audit passed - ready for deployment"
              echo "📋 Lighthouse report files:"
              ls -la reports/lighthouse/
            else
              echo "❌ Final review audit failed - no lighthouse report files generated"
              echo "📊 Check the uploaded artifacts for detailed reports"
              exit 1
            fi
          else
            echo "❌ Final review audit failed - reports/lighthouse directory not found"
            echo "📊 Check the uploaded artifacts for detailed reports"
            exit 1
          fi
      
      - name: Run smoke tests
        env:
          CYPRESS_BASE_URL: http://localhost:3000
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
        run: |
          cd frontend
          echo "🧪 Running Cypress smoke tests..."
          echo "Frontend server should be running on http://localhost:3000"
          echo "Backend server should be running on http://localhost:8000"
          
          # Verify servers are still running
          if ! curl -f -s http://localhost:3000 > /dev/null; then
            echo "❌ Frontend server not responding"
            exit 1
          fi
          
          if ! curl -f -s http://localhost:8000/health > /dev/null; then
            echo "❌ Backend server not responding"
            exit 1
          fi
          
          # Run smoke tests (remove --record and --tag if CYPRESS_RECORD_KEY is not set)
          if [ -n "${CYPRESS_RECORD_KEY:-}" ]; then
            npx cypress run --spec 'cypress/e2e/smoke.cy.ts' --record --tag smoke
          else
            npx cypress run --spec 'cypress/e2e/smoke.cy.ts'
          fi
      
      - name: Cleanup services
        if: always()
        run: |
          echo "🧹 Cleaning up services..."
          
          # Kill frontend server
          if [ -f /tmp/frontend.pid ]; then
            FRONTEND_PID=$(cat /tmp/frontend.pid)
            kill $FRONTEND_PID 2>/dev/null || true
            echo "Stopped frontend server (PID: $FRONTEND_PID)"
          fi
          
          # Kill backend server  
          if [ -f /tmp/backend.pid ]; then
            BACKEND_PID=$(cat /tmp/backend.pid)
            kill $BACKEND_PID 2>/dev/null || true
            echo "Stopped backend server (PID: $BACKEND_PID)"
          fi
          
          # Kill any remaining serve processes
          pkill -f "serve" || true
          pkill -f "uvicorn" || true
          
          # Stop docker containers
          docker compose down || true
          
          echo "✅ Cleanup completed"

  deploy:
    needs: [test, frontend-test, final-review]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H memeit.pro >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "SSH key fingerprint:"
          ssh-keygen -lf ~/.ssh/id_rsa || echo "Could not read SSH key fingerprint"
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Deploy to VPS
        run: chmod +x scripts/deploy_to_vps.sh && ./scripts/deploy_to_vps.sh
        env:
          SSH_HOST: memeit@memeit.pro

  health_check:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for deployment to settle
        run: sleep 10
      - name: Check /health endpoint
        run: |
          echo "🔍 Checking health endpoint..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://memeit.pro/health)
          echo "Response code: $RESPONSE"
          
          if [ "$RESPONSE" -ne 200 ]; then
            echo "❌ /health check failed with status code $RESPONSE"
            echo "Attempting to get response body for debugging..."
            curl -s https://memeit.pro/health || echo "Failed to get response body"
            exit 1
          fi
          
          echo "✅ Health check passed - server responding with 200"
          
          # Optional: Verify response body contains expected status
          BODY=$(curl -s https://memeit.pro/health)
          echo "Response body: $BODY"
          
          if echo "$BODY" | grep -q '"status".*"ok"'; then
            echo "✅ Response body contains expected status: ok"
          else
            echo "⚠️  Response body doesn't contain expected status, but got 200"
          fi

