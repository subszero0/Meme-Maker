name: E2E Smoke Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run smoke tests daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test against'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - custom
      custom_url:
        description: 'Custom API URL (if environment is custom)'
        required: false
        type: string
      test_video_url:
        description: 'Custom test video URL'
        required: false
        type: string

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.12"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-xdist fakeredis  # For parallel test execution and mocking
    
    - name: Determine test environment
      id: env-config
      run: |
        echo "🔧 Determining test environment configuration..."
        
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          if [ "${{ github.event.inputs.environment }}" = "custom" ]; then
            echo "BASE_URL=${{ github.event.inputs.custom_url }}" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "BASE_URL=${{ secrets.PRODUCTION_API_URL }}" >> $GITHUB_ENV
          else
            echo "BASE_URL=${{ secrets.STAGING_API_URL }}" >> $GITHUB_ENV
          fi
          
          if [ -n "${{ github.event.inputs.test_video_url }}" ]; then
            echo "TEST_VIDEO_URL=${{ github.event.inputs.test_video_url }}" >> $GITHUB_ENV
          fi
        else
          # Default to staging for scheduled and PR builds
          echo "BASE_URL=${{ secrets.STAGING_API_URL || 'http://localhost:8000' }}" >> $GITHUB_ENV
        fi
        
        # Set test video URL from secrets if available
        if [ -z "$TEST_VIDEO_URL" ]; then
          echo "TEST_VIDEO_URL=${{ secrets.TEST_VIDEO_URL || 'https://www.youtube.com/watch?v=BaW_jenozKc' }}" >> $GITHUB_ENV
        fi
        
        echo "📊 Environment configuration:"
        echo "  Event: ${{ github.event_name }}"
        echo "  Branch: ${{ github.ref_name }}"
        echo "  Staging URL secret: ${{ secrets.STAGING_API_URL && '***SET***' || 'NOT SET' }}"
        echo "  Production URL secret: ${{ secrets.PRODUCTION_API_URL && '***SET***' || 'NOT SET' }}"
    
    - name: Wait for deployment (if needed)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        echo "Waiting for deployment to complete..."
        sleep 30  # Give deployment time to complete
    
    - name: Run API health check
      run: |
        echo "Testing API availability at: $BASE_URL"
        
        # Check if this is localhost (which means we need to start a local server)
        if [[ "$BASE_URL" == *"localhost"* ]]; then
          echo "⚠️  Local API server required but not running at $BASE_URL"
          echo "ℹ️  This workflow is designed to test remote APIs (staging/production)"
          echo "ℹ️  For local testing, use the 'local-dev-test' job instead"
          echo "ℹ️  Skipping smoke tests against localhost in this context"
          exit 0
        fi
        
        # Test remote API availability
        echo "🔍 Testing remote API at: $BASE_URL"
        timeout 60 bash -c 'until curl -f "$BASE_URL/health"; do echo "Waiting for API..."; sleep 5; done'
        echo "✅ API is responding!"
    
    - name: Run quick smoke tests
      run: |
        # Skip if localhost (already handled in health check)
        if [[ "$BASE_URL" == *"localhost"* ]]; then
          echo "ℹ️  Skipping smoke tests for localhost - use local-dev-test job instead"
          exit 0
        fi
        
        cd backend
        python -m pytest tests/test_e2e_smoke.py -m "smoke and not slow" -v
      env:
        BASE_URL: ${{ env.BASE_URL }}
        TEST_VIDEO_URL: ${{ env.TEST_VIDEO_URL }}
        MAX_WAIT_TIMEOUT_SECONDS: 90
        POLL_INTERVAL_SECONDS: 3
    
    - name: Run full E2E flow test
      # Only run full E2E on main branch and manual triggers
      if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
      run: |
        # Skip if localhost (already handled in health check)
        if [[ "$BASE_URL" == *"localhost"* ]]; then
          echo "ℹ️  Skipping full E2E test for localhost - use local-dev-test job instead"
          exit 0
        fi
        
        cd backend
        python -m pytest tests/test_e2e_smoke.py::TestE2EUserFlow::test_complete_user_flow -v -s
      env:
        BASE_URL: ${{ env.BASE_URL }}
        TEST_VIDEO_URL: ${{ env.TEST_VIDEO_URL }}
        MAX_WAIT_TIMEOUT_SECONDS: 120
        POLL_INTERVAL_SECONDS: 2
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: smoke-test-results
        path: |
          backend/pytest.log
          backend/.pytest_cache/
        retention-days: 7
        if-no-files-found: warn
    
    - name: Notify on failure
      if: failure() && (github.ref == 'refs/heads/main' || github.event_name == 'schedule')
      uses: actions/github-script@v6
      with:
        script: |
          const { owner, repo } = context.repo;
          const { sha } = context;
          
          await github.rest.issues.create({
            owner,
            repo,
            title: `🔥 E2E Smoke Tests Failed - ${new Date().toISOString().split('T')[0]}`,
            body: `
            ## Smoke Test Failure Report
            
            **Environment:** ${{ env.BASE_URL }}
            **Commit:** ${sha}
            **Workflow:** ${{ github.workflow }}
            **Run:** ${{ github.run_number }}
            
            The E2E smoke tests have failed. Please investigate:
            
            - Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Verify the API is responding at ${{ env.BASE_URL }}
            - Check if the test video URL is accessible
            - Review recent deployments for issues
            
            ### Quick Debug Commands
            \`\`\`bash
            # Test API health
            curl ${{ env.BASE_URL }}/health
            
            # Run smoke tests locally
            cd backend
            BASE_URL=${{ env.BASE_URL }} python -m pytest tests/test_e2e_smoke.py -m smoke -v
            \`\`\`
            `,
            labels: ['bug', 'e2e-failure', 'urgent']
          });

  # Run tests against local development stack
  local-dev-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install fakeredis  # For mocking in tests
    
    - name: Diagnose API startup
      run: |
        cd backend
        echo "🔍 Running API startup diagnostics..."
        python ../scripts/test_api_startup.py || echo "⚠️  Diagnostics failed, but continuing..."
      env:
        DEBUG: true
        REDIS_URL: redis://localhost:6379
        CORS_ORIGINS: "*"
        AWS_ACCESS_KEY_ID: test
        AWS_SECRET_ACCESS_KEY: test
        S3_BUCKET: test-bucket
    
    - name: Start API server
      run: |
        cd backend
        
        # Set environment variables for minimal API startup
        export DEBUG=true
        export REDIS_URL=redis://localhost:6379
        export CORS_ORIGINS=*
        export AWS_ACCESS_KEY_ID=test
        export AWS_SECRET_ACCESS_KEY=test
        export S3_BUCKET=test-bucket
        
        echo "🚀 Starting API server..."
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info &
        
        # Wait for server to start with better error reporting
        echo "⏳ Waiting for API server to be ready..."
        timeout 60 bash -c '
          while ! curl -f http://localhost:8000/health 2>/dev/null; do 
            echo "  Waiting for server startup... ($(date))"
            sleep 3
          done
        '
        
        echo "✅ API server is ready!"
        curl -s http://localhost:8000/health | jq .
      env:
        DEBUG: true
        REDIS_URL: redis://localhost:6379
        CORS_ORIGINS: "*"
        AWS_ACCESS_KEY_ID: test
        AWS_SECRET_ACCESS_KEY: test
        S3_BUCKET: test-bucket
    
    - name: Run smoke tests against local server
      run: |
        cd backend
        python -m pytest tests/test_e2e_smoke.py -m "smoke and not slow" -v
      env:
        BASE_URL: http://localhost:8000
        MAX_WAIT_TIMEOUT_SECONDS: 60 