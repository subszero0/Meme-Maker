name: Visual Regression Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache Cypress binary
        id: cache-cypress
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-cache-v5-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            cypress-cache-v5-${{ runner.os }}-

      - name: Install frontend dependencies
        run: |
          # Install system Chrome for puppeteer (faster than downloading)
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          
          # Set puppeteer to use system Chrome
          export PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome-stable
          
          # Use robust npm installation script
          chmod +x scripts/install-npm-deps.sh
          ./scripts/install-npm-deps.sh 180 frontend

      - name: Install Cypress binary
        run: |
          cd frontend
          
          # Clear any Cypress environment variables that might interfere
          unset CYPRESS_INSTALL_BINARY
          unset CYPRESS_VERSION
          
          # Set cache directory
          export CYPRESS_CACHE_FOLDER=~/.cache/Cypress
          
          echo "Installing Cypress binary..."
          # Use the version from package.json, don't force any specific version
          npx cypress install || {
            echo "First install attempt failed, clearing cache and retrying..."
            rm -rf ~/.cache/Cypress
            mkdir -p ~/.cache/Cypress
            npx cypress install
          }
          
          echo "Verifying Cypress installation..."
          npx cypress verify
        timeout-minutes: 10
        env:
          CYPRESS_CACHE_FOLDER: ~/.cache/Cypress

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Start backend server
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        env:
          DEBUG: false
          REDIS_URL: redis://localhost:6379
          S3_BUCKET_NAME: test-bucket
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

      - name: Wait for backend to be ready
        run: |
          timeout 30 sh -c 'until curl -f http://localhost:8000/health; do sleep 1; done'

      - name: Start frontend server
        run: |
          cd frontend
          npm install -g serve
          serve out -s -l 3000 &
          sleep 10
        env:
          NODE_ENV: production
          PORT: 3000

      - name: Wait for frontend to be ready
        run: |
          timeout 60 sh -c 'until curl -f http://localhost:3000; do sleep 1; done'

      - name: Check if Percy token is available
        id: percy-check
        run: |
          if [ -z "${{ secrets.PERCY_TOKEN }}" ]; then
            echo "percy_available=false" >> $GITHUB_OUTPUT
            echo "Percy token not available, running Cypress tests without visual comparison"
          else
            echo "percy_available=true" >> $GITHUB_OUTPUT
            echo "Percy token available, running full visual regression tests"
          fi

      - name: Run visual regression tests with Percy
        if: steps.percy-check.outputs.percy_available == 'true'
        continue-on-error: true
        run: |
          cd frontend
          export CYPRESS_CACHE_FOLDER=~/.cache/Cypress
          npx percy exec -- npx cypress run --spec 'cypress/e2e/visual_regression.cy.ts' --config baseUrl=http://localhost:3000 --reporter spec
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          CYPRESS_baseUrl: http://localhost:3000
          CYPRESS_CACHE_FOLDER: ~/.cache/Cypress

      - name: Run Cypress tests without Percy
        if: steps.percy-check.outputs.percy_available == 'false'
        continue-on-error: true
        run: |
          cd frontend
          export CYPRESS_CACHE_FOLDER=~/.cache/Cypress
          npx cypress run --spec 'cypress/e2e/visual_regression.cy.ts' --config baseUrl=http://localhost:3000 --reporter spec
        env:
          CYPRESS_baseUrl: http://localhost:3000
          CYPRESS_CACHE_FOLDER: ~/.cache/Cypress

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-screenshots-and-videos
          path: |
            frontend/cypress/screenshots
            frontend/cypress/videos
          retention-days: 7 