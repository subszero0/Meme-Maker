name: Visual Regression Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache Cypress binary
        id: cache-cypress
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-cache-v3-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            cypress-cache-v3-${{ runner.os }}-

      - name: Install frontend dependencies
        run: |
          cd frontend
          
          # Set puppeteer to use system Chrome if available to avoid downloading
          export PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
          export PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome-stable
          export NODE_ENV=production
          
          # Install system Chrome for puppeteer (faster than downloading)
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          
          # Clear any existing npm cache and use npm install instead of npm ci
          npm cache clean --force
          
          # Use npm install instead of npm ci for better compatibility with deprecated packages
          timeout 300 npm install --production=false --legacy-peer-deps --no-audit --no-fund --maxsockets 1 || {
            echo "First attempt failed, trying with different approach..."
            rm -rf node_modules package-lock.json
            timeout 300 npm install --production=false --legacy-peer-deps --no-audit --no-fund --no-optional --maxsockets 1
          }
        timeout-minutes: 8

      - name: Install Cypress binary
        run: |
          cd frontend
          # Always install Cypress binary to ensure it's available
          echo "Installing Cypress binary..."
          npx cypress install --force
          echo "Verifying Cypress installation..."
          npx cypress verify
        timeout-minutes: 5

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Start backend server
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        env:
          DEBUG: false
          REDIS_URL: redis://localhost:6379
          S3_BUCKET_NAME: test-bucket
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

      - name: Wait for backend to be ready
        run: |
          timeout 30 sh -c 'until curl -f http://localhost:8000/health; do sleep 1; done'

      - name: Start frontend server
        run: |
          cd frontend
          npm install -g serve
          serve out -s -l 3000 &
          sleep 10
        env:
          NODE_ENV: production
          PORT: 3000

      - name: Wait for frontend to be ready
        run: |
          timeout 60 sh -c 'until curl -f http://localhost:3000; do sleep 1; done'

      - name: Check if Percy token is available
        id: percy-check
        run: |
          if [ -z "${{ secrets.PERCY_TOKEN }}" ]; then
            echo "percy_available=false" >> $GITHUB_OUTPUT
            echo "Percy token not available, running Cypress tests without visual comparison"
          else
            echo "percy_available=true" >> $GITHUB_OUTPUT
            echo "Percy token available, running full visual regression tests"
          fi

      - name: Run visual regression tests with Percy
        if: steps.percy-check.outputs.percy_available == 'true'
        run: |
          cd frontend
          npx percy exec -- npx cypress run --spec 'cypress/e2e/visual_regression.cy.ts' --config baseUrl=http://localhost:3000
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          CYPRESS_baseUrl: http://localhost:3000

      - name: Run Cypress tests without Percy
        if: steps.percy-check.outputs.percy_available == 'false'
        run: |
          cd frontend
          npx cypress run --spec 'cypress/e2e/visual_regression.cy.ts' --config baseUrl=http://localhost:3000
        env:
          CYPRESS_baseUrl: http://localhost:3000

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          retention-days: 7 